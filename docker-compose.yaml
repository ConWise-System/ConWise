services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conwise_backend
    restart: unless-stopped
    env_file:
      - .env                        # reads from root ConWise/.env
    environment:
      # Override/add anything Docker-specific here
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      APP_NAME: ${APP_NAME}
      CLIENT_URL: ${CLIENT_URL}
      API_BASE_URL: ${API_BASE_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      VERIFICATION_CODE_LENGTH: ${VERIFICATION_CODE_LENGTH}
      VERIFICATION_CODE_EXPIRES_MINUTES: ${VERIFICATION_CODE_EXPIRES_MINUTES}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./backend:/app
      - /app/node_modules       # keep container's node_modules intact

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: conwise_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next